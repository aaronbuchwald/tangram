# Desired state for tangram-host (README "Run apps as WASM components").
# Build the components first:
#   cargo build -p tangram-notes -p tangram-nutrition -p tangram-registry \
#     -p tangram-marketplace --lib --target wasm32-wasip2 --release
# then: cargo run -p tangram-host --release -- apps.toml
# Paths are relative to the directory you run the host from. Edits converge
# live: add/remove/reload apps without restarting the host.
#
# This file is the BOOTSTRAP half of the desired state: the registry app
# below carries ADDITIONAL app specs in its replicated document
# (install_app/remove_app/set_enabled actions or MCP tools); registry
# entries win on name collision. Set TANGRAM_AUTH_TOKEN (.env) to gate the
# registry's mutating routes — required for any non-loopback BIND_ADDR.

# Deployment auth mode (docs/design/auth.md). Omit [auth] entirely (the
# default) and you get self-hosted, loopback-trusted: one trusted user / LAN,
# local connections may use every route, no token required over loopback. The
# host still REFUSES a non-loopback bind of a registry app without a token.
# [auth]
# mode = "self-hosted"   # default — loopback-trusted, no token over loopback
# mode = "multi-tenant"  # per-user identity (OAuth/OIDC + hashed PATs); the
#                        # identity layer lands in checkpoints C2–C6 — today
#                        # this preserves the existing tenant/token gating.

# MCP through agentgateway (optional, RUNTIME_PLAN D3). The host runs the
# binary as a supervised child on an internal loopback port and routes
# /<app>/mcp through it, plus the aggregate /mcp endpoint (every app's tools
# on one session, namespaced <app>_<tool>). Its config is GENERATED from the
# merged desired state on every converge — never edit it by hand. Missing
# binary → the host logs a warning and serves /<app>/mcp directly (no
# aggregate endpoint). This section is read at startup; restart to change it.
[gateway]
enabled = true
# binary = "/usr/local/bin/agentgateway"  # default: `agentgateway` on $PATH
# port = 19200                            # internal port; default: auto

# LLM proxy through agentgateway (ADR-0012). Each [[gateway.llm]] becomes a
# route at /llm/<name>: a loopback client POSTs an OpenAI-style chat request to
# /llm/<name>/v1/chat/completions and the host proxies it → agentgateway → the
# provider, with the provider API key INJECTED HOST-SIDE (ADR-0005: the key
# never leaves the host; clients/components never see it). The key MUST be an
# env:// ref — put the actual key in .env (e.g. ANTHROPIC_API_KEY=sk-…). v1 is
# loopback-trusted (every route is loopback-only); do not expose off-box without
# the per-principal gate noted in ADR-0012.
# [[gateway.llm]]
# name     = "claude"                       # path segment + backend name (unique, path-safe)
# provider = "anthropic"                    # openai|anthropic|gemini|vertex|bedrock|groq|deepseek
# model    = "claude-3-5-haiku-20241022"    # OPTIONAL; omit ⇒ passthrough (client body's `model`)
# key      = "env://ANTHROPIC_API_KEY"      # env-ref; lowered to agentgateway's "$VAR"

# OpenAI-compatible providers (e.g. DeepSeek) have no native agentgateway
# provider — they are an OpenAI-shaped API at a vendor host, so the host renders
# them onto agentgateway's openAI provider with a host override (api.deepseek.com).
[[gateway.llm]]
name     = "deepseek"                       # → /llm/deepseek
provider = "deepseek"                       # OpenAI-compatible → openAI provider + api.deepseek.com override
model    = "deepseek-chat"                  # OPTIONAL; omit ⇒ passthrough (client body's `model`)
key      = "env://DEEPSEEK_API_KEY"         # env-ref; put DEEPSEEK_API_KEY=sk-… in .env

# Browser task automation (host-side; ADR-0010, docs/design/task-automation-
# browser.md). When enabled, tangram-host supervises a browser-driver child
# (like [gateway]) OUTSIDE the WASM sandbox and runs gated, credential-
# brokering automations apps REQUEST (never drive). Default-off; missing
# driver → warn and disable. The domain ceiling is default-DENY (empty ⇒ no
# navigation): list the absolute maximum any automation may touch on this
# host. Credentials come from the op:// resolver (OP_SERVICE_ACCOUNT_TOKEN in
# .env, scoped to a single 1Password item). Read at startup; restart to change.
# [automation]
# enabled = true
# driver = "/usr/local/bin/playwright"   # default: `playwright` on $PATH
# headless = true                         # false = headed (attended record)
# run_timeout_secs = 300
# browser_domains_ceiling = ["www.amazon.com", "fls-na.amazon.com"]

[apps.registry]
component = "target/wasm32-wasip2/release/registry.wasm"
ui = "apps/registry/ui"
registry = true
# Federate the fleet (RUNTIME_PLAN Phase 9; README "Federated fleet"): give
# the registry a `remote` and install/remove on ANY host propagates to all —
# the registry document syncs and each host's converge follows. Federated
# entries should use component_url+component_sha256 (portable everywhere);
# a local `component` path is host-local and fleet-errors on peers.
# remote = "https://other-host:8080/registry/sync"
# remote_token = "${TANGRAM_REMOTE_TOKEN}"   # for a private peer

# The marketplace (RUNTIME_PLAN Phase 8): a catalog of installable apps with
# pinned url+sha256 artifacts and capability manifests; its Install button
# posts to the registry above. require_auth: browsing is open, curating the
# catalog (add_listing/remove_listing) needs TANGRAM_AUTH_TOKEN.
[apps.marketplace]
component = "target/wasm32-wasip2/release/marketplace.wasm"
ui = "apps/marketplace/ui"
require_auth = true

# The tangram shell (RUNTIME_PLAN Phase S1; docs/design/tangram-shell-redesign.md,
# ADR-0007): the Obsidian-style default view — a persistent sidebar (markdown
# vault folder tree + the live apps list from GET /api/fleet) and a tabbed
# main window that renders .md files or embeds other apps as iframes. Its
# backend is an ordinary wasm component (a markdown vault in its replicated
# document); its UI is the ONE app granted a build pipeline (ADR-0007) — the
# `ui` below points at the committed Vite build output, not a single file.
# Build the UI with: (cd apps/tangram/ui && npm ci && npm run build).
# Making tangram the host's default `/` view is a deferred follow-up.
[apps.tangram]
component = "target/wasm32-wasip2/release/tangram_app.wasm"
ui = "apps/tangram/ui/dist"

# Guided Learning (docs/design/guided-learning.md): a Make It Stick-driven
# tutor — an AI-enabled component. Its ENTIRE outbound-network grant is the
# Anthropic Messages API; without it (or without a resolvable credential) the
# tutor degrades cleanly and the sync actions (artifact editing, reflection)
# still work. The HOST attaches the Anthropic credential at the component's
# http-fetch egress boundary (ADR-0005) — the plaintext key NEVER enters the
# component. `secret` is an env://NAME reference resolved from the host's
# environment (.env is loaded). Use the OAuth-token form
# `{ bearer = true, secret = "env://ANTHROPIC_AUTH_TOKEN" }` for an sk-ant-oat…
# / CLAUDE_CODE_OAUTH_TOKEN instead of an x-api-key.
[apps.guided-learning]
component = "target/wasm32-wasip2/release/guided_learning.wasm"
ui = "apps/guided-learning/ui"
allow_hosts = ["api.anthropic.com"]

[apps.guided-learning.inject]
"api.anthropic.com" = { header = "x-api-key", secret = "env://ANTHROPIC_API_KEY" }

[apps.notes]
component = "target/wasm32-wasip2/release/notes.wasm"
ui = "apps/notes/ui"

# Morning Brief — Tangram's first AI-enabled component (the offline core;
# docs/design/morning-brief.md MB1-MB5). run_brief input_mode "fixture" runs
# fully offline against bundled fixtures with a recorded LLM response — no key,
# no allow_hosts, no egress. The live tier (real Google + Anthropic calls with
# call-level [[calls]] egress grants + ANTHROPIC_API_KEY) is a separate later
# PR; until it lands, "live" runs return a clear error. require_auth gates the
# mutating routes since the brief is personal (design §6.3).
[apps.morning-brief]
component = "target/wasm32-wasip2/release/morning_brief.wasm"
ui = "apps/morning-brief/ui"
require_auth = true

[apps.nutrition]
component = "target/wasm32-wasip2/release/nutrition.wasm"
ui = "apps/nutrition/ui"
# The component's ENTIRE outbound-network grant. Without this entry,
# description-based log_meal fails with an error naming the missing grant.
allow_hosts = ["api.calorieninjas.com"]

[apps.nutrition.env]
NUTRITION_STRATEGY = "calorieninjas"

# Egress credential injection (ADR-0005, RUNTIME_PLAN Phase 10b): the HOST
# attaches the CalorieNinjas API key to the component's outbound request at
# its `http-fetch` boundary, so the plaintext key NEVER enters the
# component's address space (the component issues a bare request and the host
# authenticates it). `secret` is an env://NAME reference resolved from the
# host's environment (.env is loaded) — the secret stays out of this file and
# out of the sandbox. The injected host must also be in allow_hosts above.
[apps.nutrition.inject]
"api.calorieninjas.com" = { header = "X-Api-Key", secret = "env://CALORIENINJAS_API_KEY" }

# Auto-TODO, SAFE TIER (AC1-AC3) — docs/design/auto-todo.md. A TODO list where
# each item carries a gated per-item lifecycle (discover → classify → plan →
# approve); discovery/classification produce REVIEWABLE DATA only, and
# execute() is a no-op. require_auth gates the risk-bearing mutating actions
# (approve / reject / request_changes / confirm / execute) behind
# TANGRAM_AUTH_TOKEN, like the registry/marketplace. No outbound network is
# granted: discovery defaults to the deterministic OFFLINE rules. The optional
# LLM assist (discover_assisted, AUTO_TODO_DISCOVERY=llm) needs an Anthropic
# grant — uncomment allow_hosts + inject below to enable it (the host injects
# ANTHROPIC_API_KEY at the egress boundary, ADR-0005; the key never enters the
# component). AC4-AC6 (credentials / browser / 1Password) are NOT built — a
# later, separately-reviewed tier.
[apps.auto-todo]
component = "target/wasm32-wasip2/release/auto_todo.wasm"
ui = "apps/auto-todo/ui"
require_auth = true
# allow_hosts = ["api.anthropic.com"]   # only for the optional LLM assist
# [apps.auto-todo.env]
# AUTO_TODO_DISCOVERY = "llm"
# [apps.auto-todo.inject]
# "api.anthropic.com" = { header = "x-api-key", secret = "env://ANTHROPIC_API_KEY" }

# ── Multi-tenancy (RUNTIME_PLAN Phase 5; README "Multi-tenancy") ─────────────
# Uncomment to serve isolated, bearer-gated app sets under /t/<tenant>/
# alongside the top-level apps above (which stay unauthenticated and
# unchanged). Every request under /t/<tenant>/ — UI, state, SSE, sync, MCP —
# requires Authorization: Bearer <that tenant's token>. Tenant data lives
# under data_root (default $HOME/.tangram-tenants), one tree per tenant.
#[tenants]
#data_root = "/srv/tangram-tenants"   # default: $HOME/.tangram-tenants
#
#[tenants.alice]
#token = "${TANGRAM_TENANT_ALICE_TOKEN}"          # REQUIRED; keep it in .env
#max_apps = 8                                     # app cap (default 8)
#allow_hosts_ceiling = ["api.calorieninjas.com"]  # outbound cap (intersection)
## With no [tenants.alice.apps.*] template, alice starts with just a registry
## instance (cloned from [apps.registry] above) and installs the rest through
## it: /t/alice/registry/ — her replicated doc drives only HER namespace.
#
#[tenants.alice.apps.notes]                       # or give bootstrap apps
#component = "target/wasm32-wasip2/release/notes.wasm"
#ui = "apps/notes/ui"
