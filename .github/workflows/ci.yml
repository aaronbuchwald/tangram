name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          # wasm32-wasip2: the tangram-host capabilities and registry
          # lifecycle tests build and run the WASM components.
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      # cargo-nextest: better cross-binary parallelism, per-test timing, and
      # the workspace `.config/nextest.toml` (which caps the host-spawning
      # integration tests into a `host-integration` group so they don't
      # oversubscribe the runner and flake). taiki-e's action fetches a
      # prebuilt binary — no compile cost.
      - uses: taiki-e/install-action@nextest
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      # bash -n takes one script per invocation (a second path would just
      # become $1), hence the loop.
      - run: |
          for f in .agents/skills/local-replica/replica.sh \
                   .agents/skills/systemd-service/service.sh \
                   scripts/e2e-cloudflare-sync.sh \
                   scripts/e2e-cloudflare-apps.sh \
                   scripts/e2e-cloudflare-identity.sh \
                   apps/marketplace/seed/refresh.sh \
                   cloud/cloudflare/build-components.sh; do
            bash -n "$f"
          done
      # mcp-core is a standalone crate (cloud/cloudflare/mcp-core, ADR-0002):
      # tangram-core's sans-io MCP machine as a component for the CF Worker.
      # Built for real by the e2e jobs; lint it here.
      - run: cargo fmt --check --manifest-path cloud/cloudflare/mcp-core/Cargo.toml
      - run: >
          cargo clippy --manifest-path cloud/cloudflare/mcp-core/Cargo.toml
          --target wasm32-wasip2 -- -D warnings
      # The wasm components first: tangram-host's registry_lifecycle and
      # marketplace_lifecycle integration tests spawn the real host against
      # them (they self-skip when missing, so build them to make them run).
      - run: >
          cargo build -p tangram-notes -p tangram-nutrition -p tangram-registry
          -p tangram-marketplace -p tangram-app-tangram --lib
          --target wasm32-wasip2 --release
      # nextest with the `ci` profile: the host-integration group is capped
      # (see .config/nextest.toml), flaky-prone tests retry (reported FLAKY,
      # not silently green), and the run collects every failure instead of
      # cancelling on the first.
      - run: cargo nextest run --profile ci
      # nextest does not run doctests; keep covering them.
      - run: cargo test --doc
      # tangram-core is the portable half of the SDK (RUNTIME_PLAN Phase 1):
      # it must keep building without tokio/hyper/axum/reqwest/rmcp for
      # non-native hosts (WASI components, Cloudflare, browsers).
      - run: cargo build -p tangram-core --target wasm32-wasip2
      - run: cargo build --release

  # Fast-fail unit lane: the lib/bin unit tests + the cheap integration tests
  # (rmcp parity, SDK mcp), EXCLUDING the tangram-host integration tests that
  # spawn real host subprocesses. No wasm-component build needed. Locally this
  # set runs in ~10s of test execution vs minutes for the full suite, so it is
  # the "did I break anything" signal — and in CI it fails within ~1-2 min on
  # an obvious break, well before the slow `check` job finishes the host
  # lifecycle tests. (Same exclusion the dev box uses for its inner loop.)
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run -E 'not (package(tangram-host) and kind(test))'

  # The shell frontend (ADR-0007): the `tangram` app is the ONE app with a
  # build pipeline — npm + Vite producing a `dist/` the host serves as its
  # UI dir. This job installs from the committed lockfile, typechecks, and
  # builds; then it asserts the COMMITTED `dist/` matches a fresh build, so
  # the bundle the host serves can never silently drift from the source.
  # (Mirrors how the Cloudflare TS Worker is type-checked + built in CI.)
  shell-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/tangram/ui/package-lock.json
      - run: npm ci
        working-directory: apps/tangram/ui
      - run: npm run typecheck
        working-directory: apps/tangram/ui
      - run: npm run build
        working-directory: apps/tangram/ui
      # The committed dist/ must equal a fresh build — fail loudly if stale.
      - name: committed dist/ is up to date
        run: |
          if ! git diff --quiet -- apps/tangram/ui/dist; then
            echo "::error::apps/tangram/ui/dist is stale — run 'npm run build' in apps/tangram/ui and commit the result."
            git --no-pager diff --stat -- apps/tangram/ui/dist
            exit 1
          fi

  # Miniflare e2e for the Cloudflare sync relay (RUNTIME_PLAN Phase 4):
  # two native tangram-notes instances converge through `wrangler dev`,
  # including genesis convergence from an empty relay and restart
  # persistence. The script builds its own prerequisites (debug
  # tangram-notes, npm ci in cloud/cloudflare).
  e2e-cloudflare-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # the Worker bundles the jco-transpiled wasm32-wasip2 app
          # components (ADR-0002), built by the script's prerequisites
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      # wrangler is pinned to ~4.86 (last line supporting Node 20.3+, which
      # this matches for parity with the dev box); Node 22 here also covers
      # a future unpin to wrangler >= 4.87, which requires Node >= 22.
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud/cloudflare/package-lock.json
      - run: bash scripts/e2e-cloudflare-sync.sh

  # Miniflare e2e for the Cloudflare APP RUNTIME (RUNTIME_PLAN Phase 7 /
  # ADR-0002): the Worker hosts the jco-transpiled app components and the
  # script asserts the full surface — UI, genesis byte-parity with native,
  # action dispatch, SSE, MCP through the tangram-core machine, a native
  # replica syncing bidirectionally with the miniflare-hosted app, and
  # nutrition's offline fallback + http-fetch allowlist enforcement.
  e2e-cloudflare-apps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud/cloudflare/package-lock.json
      - run: bash scripts/e2e-cloudflare-apps.sh
      # Type-check the Worker against the generated component bindings
      # (dist/components, produced by the e2e's build step).
      - run: npx tsc --noEmit
        working-directory: cloud/cloudflare

  # Miniflare e2e for IDENTITY on Cloudflare (RUNTIME_PLAN Phase 6 /
  # ADR-0003): OAuth sign-in against a stub IdP (account == tenant,
  # collision-safe slugs), the per-tenant /t/<tenant>/ namespaces with the
  # uniform 401 matrix (state/actions/SSE/sync/MCP/UI), PATs minted from the
  # account page, a native replica syncing through TANGRAM_REMOTE_TOKEN, and
  # immediate revocation (replica reconnect-loops, never crashes). The
  # script runs its whole suite twice on fresh state.
  e2e-cloudflare-identity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: cloud/cloudflare/package-lock.json
      - run: bash scripts/e2e-cloudflare-identity.sh

  # Phase 0 of docs/RUNTIME_PLAN.md: static musl binaries + scratch images.
  # Build-only (no push) — proves the sandbox packaging keeps working.
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: bash scripts/build-images.sh
