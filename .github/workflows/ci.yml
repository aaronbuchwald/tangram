name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-wasip2
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      # tangram-core is the portable half of the SDK (RUNTIME_PLAN Phase 1):
      # it must keep building without tokio/hyper/axum/reqwest/rmcp for
      # non-native hosts (WASI components, Cloudflare, browsers).
      - run: cargo build -p tangram-core --target wasm32-wasip2
      - run: cargo build --release

  # Phase 0 of docs/RUNTIME_PLAN.md: static musl binaries + scratch images.
  # Build-only (no push) — proves the sandbox packaging keeps working.
  images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
        with:
          key: musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: bash scripts/build-images.sh
