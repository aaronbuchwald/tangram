<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Registry</title>
  <style>
    /* ── Dark performance-console language ─────────────────────────────────
       Same system as the sibling notes/nutrition apps: near-black ground,
       dark cards, thin dividers, white primary text, cool-gray secondary,
       one saturated signature color per surface. The registry is the
       fleet's control tower — its accent is the strain blue; red appears
       only on destructive affordances and error states. */
    :root {
      color-scheme: dark;
      --bg: #0c0d0f;
      --panel: #15171b;
      --panel-2: #1b1e23;
      --line: #23262b;
      --text: #f2f4f7;
      --dim: #8d95a2;
      --faint: #5d6470;
      --blue: #009eee;
      --green: #16ec06;
      --red: #ff4554;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --num: "Ubuntu Sans", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 var(--sans);
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: 22px 20px 60px; }

    .micro {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
    }
    .live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
    }
    .live .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 6px color-mix(in srgb, var(--blue) 70%, transparent);
    }
    .live.off .dot { background: var(--faint); box-shadow: none; }
    @media (prefers-reduced-motion: no-preference) {
      .live:not(.off) .dot { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 50% { opacity: .35; } }
    }

    .stat { padding: 18px 0 16px; border-bottom: 1px solid var(--line); }
    .statrow { display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }
    .stat .num {
      font-family: var(--num);
      font-size: 44px;
      font-weight: 200;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }
    .stat .micro { display: block; margin-top: 8px; }

    button { font-family: var(--sans); cursor: pointer; }
    .btn {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 9px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: transparent;
      color: var(--dim);
      white-space: nowrap;
    }
    .btn:hover { color: var(--text); border-color: var(--faint); }
    .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    .btn.primary:hover { background: color-mix(in srgb, var(--blue) 85%, #fff); }
    :focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

    /* fleet rows */
    .fleet { list-style: none; margin: 0; padding: 0 0 8px; }
    .row { border-bottom: 1px solid var(--line); padding: 14px 4px 14px 2px; }
    .rowtop { display: flex; align-items: center; gap: 10px; }
    .row .name { font-weight: 600; font-size: 14px; }
    .row .name a { color: inherit; text-decoration: none; }
    .row .name a:hover { color: var(--blue); }
    .badge {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      border: 1px solid var(--line);
      color: var(--dim);
    }
    .badge.ok { color: var(--green); border-color: color-mix(in srgb, var(--green) 35%, var(--line)); }
    .badge.err { color: var(--red); border-color: color-mix(in srgb, var(--red) 40%, var(--line)); }
    .badge.parked { color: var(--faint); }
    .rowtop .spacer { flex: 1; }
    .rowtop .ctl {
      background: none;
      border: none;
      color: var(--faint);
      font: 600 11px/1 var(--sans);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 4px 6px;
    }
    .rowtop .ctl:hover { color: var(--text); }
    .rowtop .ctl.danger:hover { color: var(--red); }
    .row .meta {
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--faint);
      overflow-wrap: anywhere;
    }
    .row .grants { margin-top: 5px; display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--dim);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 5px;
      padding: 2px 7px;
    }
    .row .errline { margin-top: 6px; font-size: 12px; color: var(--red); }
    .empty { color: var(--dim); padding: 18px 2px; font-size: 13px; }

    /* install form */
    details { border-bottom: 1px solid var(--line); }
    summary {
      list-style: none;
      cursor: pointer;
      padding: 14px 2px;
    }
    summary::-webkit-details-marker { display: none; }
    summary .micro { color: var(--blue); }
    form.install { display: grid; gap: 10px; padding: 2px 2px 18px; }
    form.install label { display: grid; gap: 5px; }
    form.install input {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 7px;
      color: var(--text);
      font: 12px/1 var(--mono);
      padding: 9px 10px;
    }
    form.install input::placeholder { color: var(--faint); }
    form.install .actions { display: flex; align-items: center; gap: 12px; margin-top: 4px; }
    #formError { color: var(--red); font-size: 12px; }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
      z-index: 10;
    }
    .toast[hidden] { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <h1>Registry</h1>
      <span class="live off" id="live"><span class="dot"></span><span id="livetext">connecting…</span></span>
    </header>

    <section class="stat">
      <div class="statrow">
        <div class="num" id="appCount">–</div>
      </div>
      <span class="micro">Apps in fleet</span>
    </section>

    <details id="installPanel">
      <summary><span class="micro">+ Install app</span></summary>
      <form class="install" id="installForm">
        <label><span class="micro">Name</span>
          <input name="name" placeholder="nutrition" required /></label>
        <label><span class="micro">Component (.wasm, host path)</span>
          <input name="component" placeholder="target/wasm32-wasip2/release/nutrition.wasm" required /></label>
        <label><span class="micro">UI directory (host path)</span>
          <input name="ui" placeholder="apps/nutrition/ui" required /></label>
        <label><span class="micro">Allow hosts (comma-separated, optional)</span>
          <input name="allow_hosts" placeholder="api.calorieninjas.com" /></label>
        <label><span class="micro">Env (KEY=VALUE, comma-separated; ${VAR} expands on the host)</span>
          <input name="env" placeholder="NUTRITION_STRATEGY=calorieninjas, CALORIENINJAS_API_KEY=${CALORIENINJAS_API_KEY}" /></label>
        <div class="actions">
          <button class="btn primary" type="submit">Install</button>
          <span id="formError"></span>
        </div>
      </form>
    </details>

    <ul class="fleet" id="fleet"></ul>
  </div>

  <div class="toast" id="toast" hidden></div>

  <script>
    const $ = (id) => document.getElementById(id);

    // ── actions: in the self-hosted, loopback-trusted default
    // (docs/design/auth.md) no credential is needed — local connections are
    // authorized, so mutating actions just POST JSON. If the host requires
    // credentials (exposed / multi-tenant) a call fails cleanly with 401 and
    // we surface the message. ──────────────────────────────────────────────
    async function act(name, args) {
      const res = await fetch(`api/actions/${name}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(args ?? {}),
      });
      const data = await res.json().catch(() => ({}));
      if (res.status === 401)
        throw new Error("unauthorized (this host requires credentials — see docs/design/auth.md)");
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data.result;
    }

    let toastTimer = null;
    function showToast(msg) {
      const t = $("toast");
      t.textContent = msg;
      t.hidden = false;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { t.hidden = true; }, 4000);
    }

    // ── fleet status: live host-level observation, NOT replicated state ────
    // Served by tangram-host one level up; absent when the registry runs
    // standalone (badges then just show the replicated enabled flag).
    let fleetStatus = null;
    async function refreshFleet() {
      try {
        const res = await fetch("../api/fleet");
        if (!res.ok) throw new Error();
        const data = await res.json();
        fleetStatus = Object.fromEntries((data.apps ?? []).map((a) => [a.name, a]));
      } catch { fleetStatus = null; }
      render();
    }
    setInterval(refreshFleet, 5000);

    // ── rendering ───────────────────────────────────────────────────────────
    let state = null; // latest replicated registry state from SSE

    function statusBadge(app) {
      const live = fleetStatus?.[app.name];
      if (!app.enabled) return ["parked", "disabled"];
      if (!live) return ["", "—"];
      if (live.error) return ["err", "error"];
      if (live.running && live.healthy) return ["ok", "healthy"];
      if (live.running) return ["", "running"];
      return ["err", "not running"];
    }

    function render() {
      if (!state) return;
      const apps = [...(state.apps ?? [])].sort((a, b) => a.name.localeCompare(b.name));
      $("appCount").textContent = apps.length;
      const fleetEl = $("fleet");
      fleetEl.replaceChildren(...apps.map((app) => {
        const li = document.createElement("li");
        li.className = "row";

        const top = document.createElement("div");
        top.className = "rowtop";
        const name = document.createElement("span");
        name.className = "name";
        const link = document.createElement("a");
        link.href = `../${app.name}/`;
        link.textContent = app.name;
        name.appendChild(link);
        const [badgeClass, badgeText] = statusBadge(app);
        const badge = document.createElement("span");
        badge.className = `badge ${badgeClass}`;
        badge.textContent = badgeText;
        const spacer = document.createElement("span");
        spacer.className = "spacer";
        const toggle = document.createElement("button");
        toggle.className = "ctl";
        toggle.textContent = app.enabled ? "disable" : "enable";
        toggle.addEventListener("click", () =>
          act("set_enabled", { name: app.name, enabled: !app.enabled })
            .catch((e) => showToast(e.message)));
        const remove = document.createElement("button");
        remove.className = "ctl danger";
        remove.textContent = "remove";
        remove.addEventListener("click", () =>
          act("remove_app", { name: app.name }).catch((e) => showToast(e.message)));
        top.append(name, badge, spacer, toggle, remove);

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = app.component;

        li.append(top, meta);
        if (app.allow_hosts?.length || app.env?.length) {
          const grants = document.createElement("div");
          grants.className = "grants";
          for (const host of app.allow_hosts ?? []) {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = `net ${host}`;
            grants.appendChild(chip);
          }
          for (const e of app.env ?? []) {
            const chip = document.createElement("span");
            chip.className = "chip";
            chip.textContent = `env ${e.key}`;
            grants.appendChild(chip);
          }
          li.appendChild(grants);
        }
        const live = fleetStatus?.[app.name];
        if (live?.error) {
          const err = document.createElement("div");
          err.className = "errline";
          err.textContent = live.error;
          li.appendChild(err);
        }
        return li;
      }));
      if (!apps.length) {
        const d = document.createElement("li");
        d.className = "empty";
        d.textContent = "No apps installed via the registry yet. Bootstrap apps from apps.toml don't appear here.";
        fleetEl.appendChild(d);
      }
    }

    // ── install form ────────────────────────────────────────────────────────
    $("installForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const form = e.target;
      const fields = Object.fromEntries(new FormData(form));
      const allow_hosts = (fields.allow_hosts ?? "").split(",").map((s) => s.trim()).filter(Boolean);
      const env = (fields.env ?? "").split(",").map((s) => s.trim()).filter(Boolean).map((pair) => {
        const i = pair.indexOf("=");
        return { key: i < 0 ? pair : pair.slice(0, i), value: i < 0 ? "" : pair.slice(i + 1) };
      });
      $("formError").textContent = "";
      try {
        await act("install_app", {
          name: fields.name.trim(),
          component: fields.component.trim(),
          ui: fields.ui.trim(),
          allow_hosts,
          env,
        });
        form.reset();
        $("installPanel").open = false;
        showToast("Installing — the host converges in seconds");
        setTimeout(refreshFleet, 1500);
      } catch (err) {
        $("formError").textContent = err.message;
      }
    });

    // ── live updates ────────────────────────────────────────────────────────
    function setLive(on, text) {
      $("live").classList.toggle("off", !on);
      $("livetext").textContent = text;
    }
    const events = new EventSource("api/events");
    events.addEventListener("state", (e) => {
      state = JSON.parse(e.data);
      setLive(true, "live");
      render();
      refreshFleet();
    });
    events.onerror = () => setLive(false, "reconnecting…");
  </script>
</body>
</html>
