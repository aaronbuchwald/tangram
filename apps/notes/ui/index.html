<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notes</title>
  <style>
    /* ── Dark performance-console language ─────────────────────────────────
       Same system as the sibling nutrition app: near-black ground, dark
       cards, thin dividers, white primary text, cool-gray secondary, one
       saturated signature color per surface. Notes is the memo pad of the
       family — its single accent is the strain blue; red appears only on
       the destructive affordance. Committed dark theme: `color-scheme:
       dark` keeps form controls and scrollbars coherent for everyone. */
    :root {
      color-scheme: dark;
      --bg: #0c0d0f;
      --panel: #15171b;
      --panel-2: #1b1e23;
      --line: #23262b;
      --text: #f2f4f7;
      --dim: #8d95a2;
      --faint: #5d6470;
      --blue: #0093e7;
      --red: #ff4554;
      --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      /* numerals want a true light weight; head with light-capable system
         faces, then fall through to the platform default */
      --num: "Ubuntu Sans", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      padding: 22px 20px 56px;
      background: var(--bg);
      color: var(--text);
      font: 14px/1.5 var(--sans);
      max-width: 600px;
      margin-inline: auto;
    }

    /* micro-label: the compact uppercase letterspaced voice of the system */
    .micro {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--line);
    }
    h1 {
      margin: 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .3em;
      text-transform: uppercase;
      color: var(--text);
    }

    /* live indicator as a sensor status readout */
    .live {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--dim);
      white-space: nowrap;
    }
    .live .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--blue);
      box-shadow: 0 0 6px color-mix(in srgb, var(--blue) 70%, transparent);
    }
    .live.off .dot { background: var(--faint); box-shadow: none; }
    @media (prefers-reduced-motion: no-preference) {
      .live:not(.off) .dot { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 50% { opacity: .35; } }
    }

    /* glanceable tier: one big thin numeral readable at arm's length */
    .stat {
      padding: 22px 0 20px;
      border-bottom: 1px solid var(--line);
    }
    .stat .num {
      font-family: var(--num);
      font-size: clamp(44px, 12vw, 56px);
      font-weight: 200;
      line-height: 1;
      letter-spacing: -.01em;
      font-variant-numeric: tabular-nums;
      color: var(--text);
    }
    .stat .micro { display: block; margin-top: 8px; }

    form { display: flex; gap: 10px; margin: 18px 0 8px; align-items: stretch; }
    input {
      flex: 1;
      min-width: 0;
      padding: 11px 14px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      font: inherit;
      caret-color: var(--blue);
    }
    input::placeholder { color: var(--faint); }
    input:focus { outline: none; border-color: var(--blue); }
    button[type="submit"] {
      font: 700 11px/1 var(--sans);
      letter-spacing: .14em;
      text-transform: uppercase;
      padding: 0 20px;
      border: none;
      border-radius: 999px;
      background: var(--blue);
      color: #fff;
      cursor: pointer;
    }
    button[type="submit"]:hover { background: color-mix(in srgb, var(--blue) 85%, #fff); }
    :focus-visible { outline: 2px solid var(--blue); outline-offset: 2px; }

    /* deep tier: the record itself, thin-ruled rows */
    ul { list-style: none; margin: 6px 0 0; padding: 0; }
    li {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      align-items: baseline;
      border-bottom: 1px solid var(--line);
    }
    li time {
      font-size: 11px;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
      color: var(--faint);
      padding: 13px 10px 13px 0;
      white-space: nowrap;
      overflow: hidden;
    }
    li .text {
      padding: 12px 8px 12px 0;
      overflow-wrap: anywhere;
      color: var(--text);
    }
    li .del {
      background: none;
      border: none;
      color: var(--faint);
      padding: 12px 4px 12px 10px;
      font: 600 13px/1 var(--sans);
      cursor: pointer;
    }
    li .del:hover { color: var(--red); }

    .empty {
      color: var(--dim);
      padding: 18px 0;
      border-bottom: 1px solid var(--line);
      font-size: 13px;
    }

    @media (max-width: 460px) {
      body { padding: 18px 14px 44px; }
      li { grid-template-columns: 52px 1fr auto; }
      li time { font-size: 10px; padding-right: 8px; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1>Notes</h1>
    <div class="live off" id="live"><span class="dot"></span><span id="liveText">connecting…</span></div>
  </header>
  <section class="stat">
    <div class="num" id="noteCount">–</div>
    <span class="micro">Notes on record</span>
  </section>
  <form id="add-form">
    <input id="note-input" placeholder="Write a note…" autocomplete="off" required />
    <button type="submit">Add</button>
  </form>
  <ul id="notes"></ul>
  <div class="empty" id="empty" hidden>No notes yet. Add one here, from a synced device, or via an MCP tool call.</div>

  <script>
    const list = document.getElementById("notes");
    const empty = document.getElementById("empty");
    const input = document.getElementById("note-input");
    const noteCount = document.getElementById("noteCount");

    async function act(name, args) {
      const res = await fetch(`api/actions/${name}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(args ?? {}),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
      return data.result;
    }

    function render(state) {
      const notes = [...(state.notes ?? [])].sort((a, b) => b.created_at_ms - a.created_at_ms);
      noteCount.textContent = notes.length;
      list.replaceChildren(...notes.map((note) => {
        const li = document.createElement("li");
        const time = document.createElement("time");
        time.textContent = new Date(note.created_at_ms).toLocaleTimeString(undefined, { timeStyle: "short" });
        const text = document.createElement("span");
        text.className = "text";
        text.textContent = note.text;
        const del = document.createElement("button");
        del.className = "del";
        del.textContent = "✕";
        del.title = "Delete note";
        del.addEventListener("click", () => act("delete_note", { id: note.id }).catch(console.error));
        li.append(time, text, del);
        return li;
      }));
      empty.hidden = notes.length > 0;
    }

    document.getElementById("add-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = "";
      try { await act("add_note", { text }); } catch (err) { console.error(err); }
    });

    // The server pushes the full state over SSE on connect and on every
    // change — including changes that arrive from a *different instance* via
    // CRDT sync — so this UI re-renders live with no polling.
    const live = document.getElementById("live");
    const liveText = document.getElementById("liveText");
    const events = new EventSource("api/events");
    events.addEventListener("state", (e) => {
      render(JSON.parse(e.data));
      live.classList.remove("off");
      liveText.textContent = "live";
    });
    events.onerror = () => {
      live.classList.add("off");
      liveText.textContent = "reconnecting…";
    };
  </script>
</body>
</html>
